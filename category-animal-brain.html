<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動物の頭脳 の記事一覧 - Animal IQ Labo</title>
    <style>
        /* 画面全体の基本スタイル */
        body { font-family: sans-serif; color: #333; background-color: #fdfbf7; margin: 0; padding: 0; }
        .wrap { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* 統一ヘッダー：左にロゴアイコン、右にメニュー */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: #fff; border-bottom: 1px solid #eee; }
        .logo-area { display: flex; align-items: center; text-decoration: none; color: #333; }
        .logo-icon { width: 40px; height: 40px; margin-right: 10px; object-fit: contain; }
        .logo-text { font-size: 24px; font-weight: bold; }
        nav a { margin-left: 20px; text-decoration: none; color: #555; font-weight: 500; }
        nav a:hover { color: #b5895b; }

        /* カテゴリーヘッダー */
        .category-title-area { text-align: center; margin: 50px 0 30px; }
        .cat-badge { color: #b5895b; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }
        .category-title-area h2 { font-size: 28px; margin: 10px 0; color: #222; }

        /* 記事一覧レイアウト：左にイラスト、右にテキスト */
        .article-list { display: flex; flex-direction: column; gap: 30px; margin-top: 40px; }
        .article-card { display: flex; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s; }
        .article-card:hover { transform: translateY(-3px); }
        .article-img-wrapper { width: 30%; min-width: 200px; max-width: 260px; background: #f9f9f9; }
        .article-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .article-content { width: 70%; padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        .article-date { font-size: 13px; color: #999; margin-bottom: 8px; }
        .article-title { font-size: 20px; font-weight: bold; margin: 0 0 10px 0; }
        .article-title a { color: #333; text-decoration: none; }
        .article-title a:hover { color: #b5895b; }
        .article-desc { color: #666; font-size: 14px; line-height: 1.6; margin: 0; }

        .back-link-wrapper { text-align: center; margin: 50px 0; }
        .back-link { color: #b5895b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-area">
            <!-- 左上：ロゴアイコン（ファイル名に合わせて調整してください） -->
            <img src="4animals-logo-icon.webp" alt="Animal IQ Labo Icon" class="logo-icon">
            <span class="logo-text">Animal IQ Labo</span>
        </a>
        <!-- 右側統一メニュー -->
        <nav>
            <a href="index.html">TOP</a>
            <a href="animal.html">Animal</a>
            <a href="blog.html">Blog</a>
        </nav>
    </header>

    <main class="wrap">
        <div class="category-title-area">
            <span class="cat-badge">🧠 Category</span>
            <h2>動物の頭脳 の記事一覧</h2>
        </div>

        <div class="article-list">
            <!-- 📁 記事カード（左イラスト・右テキスト） -->
            <article class="article-card">
                <div class="article-img-wrapper">
                    <!-- 左側：小さいイラスト（豚のイラスト画像） -->
                    <img src="pig-illust.webp" alt="豚の知能イラスト" class="article-img">
                </div>
                <div class="article-content">
                    <div class="article-date">📅 2026年7月16日</div>
                    <h3 class="article-title"><a href="pig-clean.html">豚のエピソード：犬以上の学習力を持つ認知能力</a></h3>
                    <p class="article-desc">豚が示す驚くべき学習能力と問題解決スキル。犬との認知能力比較から見えてくる、豚の実力の秘密とは。</p>
                </div>
            </article>
        </div>

        <div class="back-link-wrapper">
            <a href="blog.html" class="back-link">← ブログトップに戻る</a>
        </div>
    </main>
</body>
</html>
