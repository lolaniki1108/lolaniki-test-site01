<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫（ネコ） の記事一覧 - Animal IQ Labo</title>
    <style>
        body { font-family: sans-serif; color: #333; background-color: #fdfbf7; margin: 0; padding: 0; }
        .wrap { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* ヘッダー：スマホでも横並びをキープ */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; }
        .logo-area { display: flex; align-items: center; text-decoration: none; color: #333; }
        /* ３：左上アイコンを30%大きく（50px → 65pxに拡大） */
        .logo-icon { height: 65px; width: auto; margin-right: 12px; object-fit: contain; }
        .logo-text { font-size: 22px; font-weight: bold; }
        nav { display: flex; gap: 15px; }
        nav a { text-decoration: none; color: #555; font-weight: bold; font-size: 15px; }
        nav a:hover { color: #b5895b; }

        .category-title-area { text-align: center; margin: 40px 0 20px; }
        .cat-badge { color: #b5895b; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }
        .category-title-area h2 { font-size: 26px; margin: 10px 0; color: #222; }

        /* ４：スマホ対応（フレックスの縦横切り替え） */
        .article-list { display: flex; flex-direction: column; gap: 25px; margin-top: 30px; }
        .article-card { display: flex; flex-direction: row; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        
        /* ２：イラストを40%くらいのサイズ感に（幅を狭める） */
        .article-img-wrapper { width: 140px; min-width: 140px; max-width: 140px; background: #f9f9f9; }
        .article-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .article-content { padding: 20px; display: flex; flex-direction: column; justify-content: center; flex-grow: 1; }
        .article-title { font-size: 18px; font-weight: bold; margin: 0 0 10px 0; line-height: 1.4; }
        .article-title a { color: #333; text-decoration: none; }
        .article-title a:hover { color: #b5895b; }
        .article-desc { color: #666; font-size: 14px; line-height: 1.5; margin: 0; }

        .back-link-wrapper { text-align: center; margin: 50px 0; }
        .back-link { color: #b5895b; text-decoration: none; font-weight: bold; }

        /* スマートフォン画面用の改善スタイル */
        @media (max-width: 600px) {
            header { padding: 10px 15px; }
            .logo-icon { height: 50px; } /* スマホではロゴを少しだけ自動縮小 */
            .logo-text { font-size: 18px; }
            nav a { font-size: 14px; }
            .article-card { flex-direction: column; } /* スマホではイラストと文字を上下並びに */
            .article-img-wrapper { width: 100%; min-width: 100%; max-width: 100%; height: 180px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-area">
            <img src="cropped-logo-icon.webp" alt="Animal IQ Labo" class="logo-icon">
            <span class="logo-text">Animal IQ Labo</span>
        </a>
        <nav>
            <a href="index.html">TOP</a>
            <a href="animal.html">Animal</a>
            <a href="blog.html">Blog</a>
        </nav>
    </header>

    <main class="wrap">
        <div class="category-title-area">
            <span class="cat-badge">🐱 CATEGORY</span>
            <h2>猫（ネコ） の記事一覧</h2>
        </div>

        <div class="article-list">
            <article class="article-card">
                <div class="article-img-wrapper">
                    <img src="cat-illust.webp" alt="猫のイラスト" class="article-img">
                </div>
                <div class="article-content">
                    <!-- １：投稿日は非表示にしました -->
                    <h3 class="article-title"><a href="cat-rubbing-softly.html">猫が「あなただけ」に見せる行動5選――愛情サインの神経科学</a></h3>
                    <p class="article-desc">猫が飼い主にだけ見せる5つの愛情行動と、その裏にある科学的な理由。スロープリンクや愛着研究から、猫のサインを読み解きます。</p>
                </div>
            </article>
        </div>

        <div class="back-link-wrapper">
            <a href="animal.html" class="back-link">← 動物一覧に戻る</a>
        </div>
    </main>
</body>
</html>
